version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: keryx-mongo
    restart: unless-stopped
    ports:
      - "7667:27017"   # Host port 7667 → Container port 27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: keryx
      MONGO_INITDB_ROOT_PASSWORD: keryx_password
    volumes:
      - keryx-data:/data/db
    networks:
      - keryx-network

volumes:
  keryx-data:

networks:
  keryx-network:
    driver: bridge
